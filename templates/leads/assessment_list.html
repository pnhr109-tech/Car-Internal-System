{% extends 'base/internal_base.html' %}
{% load static %}

{% block title %}車査定申込一覧 - gigicompany{% endblock %}

{% block content %}
    <!-- ローディングオーバーレイ -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner-border text-light" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- トースト通知エリア -->
    <div class="toast-container" id="toastContainer"></div>

    <div class="container-xxl py-4">
        <!-- ヘッダーエリア -->
        <div class="row mb-3">
            <div class="col">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <h4 class="mb-0">
                        <i class="bi bi-car-front-fill text-primary"></i>
                        査定申込データ
                    </h4>
                    <div class="d-flex gap-2 flex-shrink-0">
                        <a href="/sateiinfo/new/" class="btn btn-success">
                            <i class="bi bi-plus-circle"></i> 新規追加
                        </a>
                        <button class="btn btn-primary" onclick="resetAndLoad()">
                            <i class="bi bi-arrow-clockwise"></i> 再読込
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 検索フォーム -->
        <div class="card search-card">
            <div class="card-header d-flex justify-content-between align-items-center"
                 role="button" data-bs-toggle="collapse" data-bs-target="#searchFormCollapse"
                 style="cursor:pointer">
                <h5 class="mb-0">
                    <i class="bi bi-search"></i> 検索
                </h5>
                <i id="searchToggleIcon" class="bi bi-chevron-down"></i>
            </div>
            <div class="collapse" id="searchFormCollapse">
            <div class="card-body">
                <form id="searchForm" onsubmit="event.preventDefault(); searchAssessments();">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label for="customerName" class="form-label">お名前</label>
                            <input type="text" class="form-control" id="customerName" placeholder="例: 山田太郎">
                        </div>
                        <div class="col-md-3">
                            <label for="phoneNumber" class="form-label">電話番号</label>
                            <input type="text" class="form-control" id="phoneNumber" placeholder="例: 090-1234-5678">
                        </div>
                        <div class="col-md-3">
                            <label for="maker" class="form-label">メーカー</label>
                            <input type="text" class="form-control" id="maker" placeholder="例: トヨタ">
                        </div>
                        <div class="col-md-3">
                            <label for="carModel" class="form-label">車種</label>
                            <input type="text" class="form-control" id="carModel" placeholder="例: プリウス">
                        </div>
                        <div class="col-md-3">
                            <label for="address" class="form-label">住所</label>
                            <input type="text" class="form-control" id="address" placeholder="例: 東京都">
                        </div>
                        <div class="col-md-3">
                            <label for="externalId" class="form-label">外部申込番号 <small class="text-muted">（ナビクル等）</small></label>
                            <input type="text" class="form-control" id="externalId" placeholder="例: 9249782">
                        </div>
                        <div class="col-md-3">
                            <label for="applicationNumber" class="form-label">内部申込番号</label>
                            <input type="text" class="form-control" id="applicationNumber" placeholder="例: N-20260410-0001">
                        </div>
                        <div class="col-md-5">
                            <label class="form-label">お申込日時（範囲検索）</label>
                            <div class="row g-2">
                                <div class="col-5">
                                    <input type="date" class="form-control" id="dateFrom">
                                </div>
                                <div class="col-2 date-separator">～</div>
                                <div class="col-5">
                                    <input type="date" class="form-control" id="dateTo">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row mt-3">
                        <div class="col">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-search"></i> 検索
                            </button>
                            <button type="button" class="btn btn-secondary ms-2" onclick="clearSearch()">
                                <i class="bi bi-x-circle"></i> クリア
                            </button>
                        </div>
                    </div>
                </form>
            </div>
            </div><!-- /.collapse -->
        </div>

        <!-- 件数表示エリア（検索フォームの下） -->
        <div class="row mb-3">
            <div class="col">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <p class="text-muted mb-0 summary-line">
                        <span class="info-badge" id="totalCountBadge">総件数: <span id="totalCount">-</span>件</span>
                        <span class="ms-2" id="currentPageInfo">
                            (<span id="pageStart">-</span>～<span id="pageEnd">-</span>件目を表示)
                        </span>
                    </p>
                    <div id="paginationTopRow" class="ui-hidden">
                        <nav aria-label="ページネーション" id="paginationNavTop">
                            <ul class="pagination mb-0" id="paginationContainerTop">
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>

        <!-- フィードリスト（PC・スマホ共通） -->
        <div class="card">
            <div class="card-body p-0" id="assessmentFeedContainer">
                <div class="text-center text-muted py-4">
                    <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                    データを読み込んでいます...
                </div>
            </div>
        </div>

        <!-- ページネーション（下部） -->
        <div class="row mt-3 ui-hidden" id="paginationBottomRow">
            <div class="col">
                <div class="d-flex justify-content-end align-items-center">
                    <nav aria-label="ページネーション" id="paginationNavBottom">
                        <ul class="pagination mb-0" id="paginationContainerBottom">
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <!-- FAB: トップへ戻る -->
    <div class="fab-stack">
        <button class="fab-btn fab-btn--light" id="backToTopBtn" data-fab-hidden="true" aria-label="トップへ戻る">
            <i class="bi bi-chevron-up"></i> トップ
        </button>
    </div>

    <div class="modal fade" id="statusUpdateModal" tabindex="-1" aria-labelledby="statusUpdateModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="statusUpdateModalLabel">対応ステータス更新</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="閉じる"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="modalAssessmentId">
                    <div class="mb-3">
                        <label for="modalFollowStatus" class="form-label">対応ステータス</label>
                        <select id="modalFollowStatus" class="form-select" onchange="onModalStatusChange()">
                            {% for status in follow_status_choices %}
                            <option value="{{ status }}">{{ status }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3 d-none" id="modalReservationRow">
                        <label for="modalReservationDatetime" class="form-label">商談予定日時 <span class="text-danger">*</span></label>
                        <input type="datetime-local" id="modalReservationDatetime" class="form-control">
                    </div>
                    <div>
                        <label for="modalSalesNote" class="form-label">コメント</label>
                        <textarea id="modalSalesNote" class="form-control" rows="6" placeholder="電話結果・商談予定などを記録"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">閉じる</button>
                    <button type="button" class="btn btn-primary" onclick="saveStatusUpdate()">更新する</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="assessmentDetailModal" tabindex="-1" aria-labelledby="assessmentDetailModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="assessmentDetailModalLabel">申込詳細</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="閉じる"></button>
                </div>
                <div class="modal-body" id="assessmentDetailBody">
                    読み込み中...
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">閉じる</button>
                </div>
            </div>
        </div>
    </div>

{% endblock %}

{% block extra_scripts %}
<script>const currentUserDisplayName = '{{ current_user_display_name|escapejs }}';</script>
<script src="{% static 'js/assessment_list.js' %}"></script>
{% endblock %}
